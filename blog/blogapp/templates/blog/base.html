{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}{% endblock %}</title>
  <link href="{% static "css/blog.css" %}" rel="stylesheet">

  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
    }

    #content {
        flex: 3;
        padding: 30px;
        background-color: #ffffff;
        min-height: 100vh;
        box-shadow: inset -1px 0 0 #ddd;
    }

    #sidebar {
        flex: 1;
        padding: 20px;
        background-color: #2c3e50;
        color: white;
        min-height: 100vh;
    }

    #sidebar h2 {
        margin-top: 0;
        color: #ecf0f1;
    }

    #sidebar p {
        color: #bdc3c7;
    }
  </style>

</head>
<body>

  <div id="content">
    {% block content %}
    {% endblock %}
  </div>

  <div id="sidebar">
    <h2>My blog</h2>
    <p>This is my blog.</p>
  </div>

</body>
</html>
